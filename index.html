<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3Stroll Bridge</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; max-width: 500px; margin: 20px auto; padding: 0 15px; background-color: #f4f7f9; }
        h3 { text-align: center; color: #333; }
        .btn {
            display: block;
            margin-bottom: 12px;
            padding: 18px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
        }
        .stats-container {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h3>Web3Stroll 脚本指挥部</h3>
    
    <a id="link-1" class="btn" href="https://app.grass.io/register?referralCode=bkOAeUghjSnpavq">1. Grass Register</a>
    <a id="link-2" class="btn" href="https://links.denet.app/mobile?referrer=0xaa2f4b344c3c00faa9b842953114acc18ebb1fc0">2. DeNet Mobile</a>
    <a id="link-3" class="btn" href="https://x.com/ZhouYuhua5023/status/2046852230465433770/video/1?s=46">3. X Status Video</a>
    <a id="link-4" class="btn" href="https://x.com/zhouyuhua5023?s=21">4. X Profile</a>
    <a id="link-5" class="btn" href="#">5. 新项目待定</a>

    <div class="stats-container">
        本站累计点击：<span id="fake_pv" style="color:#007bff; font-weight:bold;">100,000+</span> 次
        <br>
        当前接入节点：<span id="fake_uv" style="color:#28a745; font-weight:bold;">...</span> 
    </div>

    <script>
        var timer = setInterval(function() {
            var pv = document.getElementById('busuanzi_value_site_pv');
            var uv = document.getElementById('busuanzi_value_site_uv');
            if (pv && pv.innerText != '--' && pv.innerText != '...') {
                // 累计点击 = 实际点击 + 102488
                document.getElementById('fake_pv').innerText = (parseInt(pv.innerText) + 102488).toLocaleString();
                // 接入节点（访客数）= 实际访客 + 888
                document.getElementById('fake_uv').innerText = (parseInt(uv.innerText) + 888).toLocaleString();
                clearInterval(timer);
            }
        }, 500);
    </script>

    <div style="display:none">
        <span id="busuanzi_container_site_pv"><span id="busuanzi_value_site_pv"></span></span>
        <span id="busuanzi_container_site_uv"><span id="busuanzi_value_site_uv"></span></span>
    </div>

</body>
</html>
